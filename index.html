<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AR Marker</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: true;"
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <a-marker type="pattern" url="pattern-marker.patt">

    <a-entity
      position="0 0.05 0"
      animation="property: position; dir: alternate; dur: 1500; easing: easeInOutSine; loop: true; to: 0 0.15 0"
    >

      <a-sphere
        position="0 0.18 0"
        radius="0.08"
        color="#ff2d55">
      </a-sphere>

      <a-cone
        position="0 0.08 0"
        radius-bottom="0.05"
        radius-top="0"
        height="0.16"
        color="#ff2d55">
      </a-cone>

    </a-entity>

    <a-circle
      position="0 0.01 0"
      rotation="-90 0 0"
      radius="0.12"
      material="color: #000; transparent: true; opacity: 0.25">
    </a-circle>

  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
