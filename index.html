<a-marker type="pattern" url="pattern-marker.patt">

  <!-- 全体をまとめる親（上下に動かす） -->
  <a-entity
    position="0 0.05 0"
    animation="property: position; dir: alternate; dur: 1500; easing: easeInOutSine; loop: true; to: 0 0.15 0"
  >

    <!-- ピン上部（丸） -->
    <a-sphere
      position="0 0.18 0"
      radius="0.08"
      color="#ff2d55"
    ></a-sphere>

    <!-- ピン下部（先端） -->
    <a-cone
      position="0 0.08 0"
      radius-bottom="0.05"
      radius-top="0"
      height="0.16"
      color="#ff2d55"
    ></a-cone>

    <!-- くるっとゆっくり回転 -->
    <a-animation
      attribute="rotation"
      to="0 360 0"
      dur="6000"
      repeat="indefinite"
      easing="linear">
    </a-animation>

  </a-entity>

  <!-- 影（浮いてる感じが強くなる） -->
  <a-circle
    position="0 0.01 0"
    rotation="-90 0 0"
    radius="0.12"
    material="color: #000; transparent: true; opacity: 0.25"
  ></a-circle>

</a-marker>
