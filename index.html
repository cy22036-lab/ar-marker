<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>AR.js Image Marker (iPhone)</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>

  <body>
    <a-scene
      embedded
      vr-mode-ui="enabled: false"
      renderer="antialias: true; colorManagement: true;"
      arjs="sourceType: webcam; debugUIEnabled: false;"
    >
      <!-- 画像を事前ロード -->
      <a-assets>
        <img id="overlay" src="overlay.png" crossorigin="anonymous" />
      </a-assets>

      <!-- ★あなたの patt を読む -->
      <a-marker type="pattern" url="pattern-marker.patt">
        <!-- マーカー上に「板」を置いて、その板に画像を貼る -->
        <!-- width/height は表示したい比率に合わせて調整 -->
        <a-plane
          src="#overlay"
          position="0 0 0"
          rotation="-90 0 0"
          width="1.2"
          height="0.8"
          material="transparent: true; opacity: 1"
        ></a-plane>

        <!-- ちょい浮かせたい場合は position の y を少し上げる -->
        <!-- 例: position="0 0.01 0" -->
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
